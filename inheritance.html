<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Inheritance example</h3>
    <script>
        //inheritance - reusuability
        class abc { //parent/base/super class
            constructor() {
                console.log('ABc constructor called..');         
            }
            area(r){
                const pi=3.14
                document.write('<br>Area of circle is '+(pi*r**2))
            }
        }
        class xyz extends abc {//child/derived/sub class
            constructor() {
                super()
                console.log('Xyz constructor called..');
            }
            cube(a){
                document.write('<br>Cube is '+(a**3))
            }
        }
        let x1 = new xyz()
        
        x1.area(20)
        x1.cube(5)
    </script>
</body>

</html>
