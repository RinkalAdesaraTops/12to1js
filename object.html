<body>
    <script>
        // let a=10

        // key-value pair
        let a = {
            "rollno":101,
            "name":"sdgf",
            "age":25,
            "surname":"uewyr"       
        }
        //add new key-value in object 
        a.lastname = "Xyz"
        // a["lastname"] = "xyz"
        for(var x in a){
            // document.write('<br>Your ',x," is ",a[x])
            document.write('<br>Your '+x+" is "+a[x])
        }
        document.write('<br><hr>')
        //update
        a.age = 30
        for(var x in a){
            document.write('<br>Your '+x+" is "+a[x])
        }
        //delete
        delete a.surname
        document.write('<br><hr>')

        for(var x in a){
            document.write('<br>Your '+x+" is "+a[x])
        }

    </script>
