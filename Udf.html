<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <H3>User Defined Function</H3>
    <script>
        // user defined function - UDF
        // 1)TNRN - take(argument) nothing return (statement/variable/value) nothing
        function fact_no(){
            let no = 5
           // 5! = 5*4*3*2*1
            let i=1
            let m =1 
            while(i<=no){ //6<=5
                m = m*i
                i++ //1 2 3 4 5 6
            }
            document.write('<br>'+no+' Factorial is ',m)
        }
        function add(){
            let a=20
            let b=10
            document.write('<br>Addition is ',(a+b))
        }
        fact_no()
        add()
    </script>
</body>
</html>
