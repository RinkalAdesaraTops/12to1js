<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=100
        b=200
        if(a>b){
            //true block
            document.write('<br>A is maximum')
        } else {
            //false block
            document.write('<br>B is maximum')
        }
        let age=25
        if(age>=18){
            document.write('<br>Eligible 4 vote')
        } else {
            document.write('<br>Not Eligible 4 vote')
        }
        let no=36
        let res = no%2
        if(res==0){
            document.write('<br>It is even no')
        } else {
            document.write('<br>It is odd no')
        }
    </script>
</body>
