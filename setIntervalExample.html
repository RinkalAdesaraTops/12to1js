<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <span id="hr">00</span>:
        <span id="min">00</span>:
        <span id="sc">00</span>
    </div>
    <script>
        let count=0
        let min=0
        setInterval(()=>{
            document.getElementById('sc').innerHTML = ++count
            if(count>=10){
                document.getElementById('min').innerHTML = ++min
                count=0
            }
        },1000)
    </script>
</body>
</html>
