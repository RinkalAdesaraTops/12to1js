<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // a,b,c nested if
        // a,b,c,d nested if
        let a = 7
        let b = 40
        let c = 25
        if (a > b) {
             //7>4
            if (a > c) { //7>25
                document.write('<br>A is maximum')
            } else {
                document.write('<br>C is maximum')
            }
        } else {
            if (b > c) {
                document.write('<br>B is maximum')
            } else {
                document.write('<br>C is maximum')
            }
        }
    </script>
</body>

</html>
