<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- error- system generated
        exception - user generated error
        exception handling - try_catch
    -->
    <h3>Try Catch block Example</h3>
    <script>
        let a = 25
        let b = 5
        try {
            if (b < 0) {
                throw "<b>Division is not possible by zero</b>"
            }
            //error generate/create
            // if (b > 0) {
            //     document.write('<br>Division is ' + (a / b))
            // } else {
            //     throw "<b>Division is not possible by zero</b>"
            // }
        } catch (e) {
            //SOLUtion 
            document.write('<br>Error msg is ' + e)
        } finally {
            //code always executed
            document.write('<br>Addition is ' + (a + b))
            document.write('<br>Multiply is ' + (a * b))
            document.write('<br>Minus is ' + (a - b))
        }
    </script>
</body>

</html>
