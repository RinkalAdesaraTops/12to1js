<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //shorthand +=,-=,*=,/=,%=,**=
        let a=15
        document.write('<br>A is '+a)
        a+=2 //a=a+2
        document.write('<br>A is '+a)
        a-=5
        document.write('<br>A is '+a)
        a*=2
        document.write('<br>A is '+a)

        // relational/comparision - <,>,<=,>=,==,!=,===,!==
        a=35
        b="35"
        document.write('<br> a > b is ',(a>b)) //35>35
        document.write('<br> a < b is '+(a<b)) //35<35
        document.write('<br> a >= b is '+(a>=b)) //35>45
        document.write('<br> a <= b is '+(a<=b)) //35<45
        document.write('<br> a == b is '+(a==b)) //35>45 checks only value
        document.write('<br> a != b is '+(a!=b)) //35<45
        document.write('<br> a === is '+(a===b)) //35>45 check value + datatype
        document.write('<br> a !== b is '+(a!==b)) //35<45
    </script>
</body>
</html>
