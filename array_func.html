<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = [23, 11, 34, 45, 56]
        document.write('<br>' + a)
        a.push(100, 200, 37)
        document.write('<br>' + a)
        a.pop()
        document.write('<br>' + a)
        a.unshift(22, 55, 44)
        document.write('<br>' + a)
        a.shift()
        document.write('<br>' + a)
        a.splice(2, 2, 568, 896)
        document.write('<br>' + a)
        // a.splice(3,2) - positionwise data add or remove
        // document.write('<br>'+a)
        // slice - positionwise data get
        let b = a.slice(4)
        document.write('<br>' + b)
        b = a.slice(3,7) //7-1=6
        document.write('<br>' + b)
        b = a.slice(-4)
        document.write('<br>'+b)
        b = a.slice(-7,-2) // -2-1 = -3
        document.write('<br>'+b)
        arr2 = [34,452,10,200,56,78,65]
        // arr2 = [10,452,34,200,56,78,65]
        // compare function
        document.write('<br>Asc - Sorting---  '+arr2.sort(function(a,b){
                                            return a-b //a=34-452 =- 34-10=24
        }))
        document.write('<br>Desc - Sorting---  '+arr2.reverse())
    </script>
</body>

</html>
